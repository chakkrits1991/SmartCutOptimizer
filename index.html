<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCut 200 Optimizer V11</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d35400; --bg: #f4f7f6; --error: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        .container { max-width: 1300px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 992px) {
            .container { flex-direction: row; padding: 20px; }
            .sidebar { width: 350px; flex-shrink: 0; }
            .output { flex-grow: 1; }
        }

        .sidebar { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .output { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .item-row { display: grid; grid-template-columns: 1fr 1fr 1fr 40px; gap: 5px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; touch-action: manipulation; }
        .btn-add { background: #27ae60; color: white; width: 100%; padding: 12px; margin: 10px 0; }
        .btn-calc { background: #2980b9; color: white; width: 100%; padding: 18px; font-size: 18px; width: 100%; }
        .btn-io { background: #7f8c8d; color: white; flex: 1; padding: 10px; font-size: 14px; margin: 5px; }
        .btn-del { background: #eee; color: #666; font-size: 18px; }

        /* แก้ไขส่วน Canvas ให้แสดงเต็มหน้าจอ 100% ไม่ต้องเลื่อน */
        .canvas-container {
            width: 100%;
            margin-top: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            line-height: 0; /* แก้ไขช่องว่างใต้ canvas */
        }
        canvas { 
            width: 100% !important; /* บังคับกว้างเต็มพื้นที่ Parent */
            height: auto !important; /* ปรับสูงตามสัดส่วน */
            display: block;
        }

        .summary-bar { 
            background: var(--primary); color: white; padding: 15px; 
            border-radius: 12px; margin-bottom: 20px; 
            display: flex; flex-direction: column; gap: 10px; text-align: center; 
        }
        @media (min-width: 600px) { .summary-bar { flex-direction: row; justify-content: space-around; } }

        .error-msg { color: var(--error); font-weight: bold; padding: 10px; border: 1px solid var(--error); border-radius: 8px; margin-bottom: 10px; display: none; }
        .invalid input { border: 2px solid var(--error); background: #fff5f5; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2 style="margin-top:0; color:var(--primary);">✂️ SmartCut 200</h2>
        <div id="error-banner" class="error-msg">⚠️ ชิ้นงานใหญ่เกิน 200x100!</div>

        <div id="items-list">
            <div class="item-row">
                <input type="number" class="w" value="140" placeholder="กว้าง">
                <input type="number" class="h" value="48" placeholder="สูง">
                <input type="number" class="qty" value="2" placeholder="ตัว">
                <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
            </div>
        </div>

        <button class="btn-add" onclick="addItem()">+ เพิ่มรายการ</button>
        <button class="btn-calc" onclick="validateAndRun()">คำนวณแผนการตัด</button>
        
        <div style="display: flex; margin-top: 10px;">
            <button class="btn-io" onclick="exportData()">📤 Export</button>
            <button class="btn-io" onclick="document.getElementById('fileInput').click()">📥 Import</button>
            <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div class="output">
        <div id="summary-area"></div>
        <div id="results-area">
             <p style="text-align:center; color:#999; padding:40px;">กดคำนวณเพื่อดูแผนการวางวัสดุ</p>
        </div>
    </div>
</div>

<script>
    const SHEET_W = 200, SHEET_H = 100, KERF = 1, SCALE = 10; // เพิ่ม Scale เป็น 10 เพื่อความละเอียดของลายเส้น

    function addItem(w='', h='', qty='') {
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `<input type="number" class="w" value="${w}" placeholder="ก"><input type="number" class="h" value="${h}" placeholder="ส"><input type="number" class="qty" value="${qty}" placeholder="น"><button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
        document.getElementById('items-list').appendChild(div);
    }

    function validateAndRun() {
        const rows = document.querySelectorAll('.item-row');
        let hasError = false;
        document.getElementById('error-banner').style.display = 'none';
        rows.forEach(row => {
            const w = parseFloat(row.querySelector('.w').value), h = parseFloat(row.querySelector('.h').value);
            row.classList.remove('invalid');
            if (!( (w <= SHEET_W && h <= SHEET_H) || (h <= SHEET_W && w <= SHEET_H) )) { row.classList.add('invalid'); hasError = true; }
        });
        if (hasError) { document.getElementById('error-banner').style.display = 'block'; window.scrollTo({top: 0, behavior: 'smooth'}); return; }
        runCalculation();
    }

    function runCalculation() {
        let items = [];
        document.querySelectorAll('.item-row').forEach(row => {
            let w = parseFloat(row.querySelector('.w').value), h = parseFloat(row.querySelector('.h').value), qty = parseInt(row.querySelector('.qty').value);
            if(w && h && qty) for(let i=0; i<qty; i++) items.push({w, h});
        });

        items.sort((a, b) => (b.w * b.h) - (a.w * a.h));
        let sheets = [];

        for (let item of items) {
            let placed = false;
            for (let sheet of sheets) {
                for (let strip of sheet.strips) {
                    let hUsed = strip.items.reduce((s, it) => s + it.h + KERF, 0);
                    if (item.w <= strip.w && hUsed + item.h <= SHEET_H) {
                        strip.items.push({ ...item, x: strip.x, y: hUsed });
                        sheet.usedArea += (item.w * item.h); placed = true; break;
                    }
                    if (item.h <= strip.w && hUsed + item.w <= SHEET_H) {
                        strip.items.push({ w: item.h, h: item.w, x: strip.x, y: hUsed });
                        sheet.usedArea += (item.w * item.h); placed = true; break;
                    }
                }
                if (placed) break;
                let wUsed = sheet.strips.reduce((s, st) => s + st.w + KERF, 0);
                let bestW = Math.min(item.w, item.h), bestH = Math.max(item.w, item.h);
                if (bestH > SHEET_H) [bestW, bestH] = [item.w, item.h];
                if (wUsed + bestW <= SHEET_W) {
                    sheet.strips.push({ x: wUsed, w: bestW, items: [{ w: bestW, h: bestH, x: wUsed, y: 0 }] });
                    sheet.usedArea += (item.w * item.h); placed = true; break;
                }
            }
            if (!placed) {
                let bestW = Math.min(item.w, item.h), bestH = Math.max(item.w, item.h);
                if (bestH > SHEET_H) [bestW, bestH] = [item.w, item.h];
                sheets.push({ usedArea: (item.w * item.h), strips: [{ x: 0, w: bestW, items: [{ w: bestW, h: bestH, x: 0, y: 0 }] }] });
            }
        }
        render(sheets);
    }

    function render(sheets) {
        const res = document.getElementById('results-area');
        const sumArea = document.getElementById('summary-area');
        res.innerHTML = "";
        let totalEff = sheets.reduce((a, b) => a + (b.usedArea / (SHEET_W * SHEET_H)), 0) / sheets.length * 100;
        sumArea.innerHTML = `<div class="summary-bar"><span>📦 ใช้ ${sheets.length} แผ่น</span><span>✅ ประสิทธิภาพ ${totalEff.toFixed(1)}%</span></div>`;
        
        sheets.forEach((sheet, idx) => {
            const div = document.createElement('div');
            div.style.marginBottom = "25px";
            div.innerHTML = `<div style="margin-bottom:8px; font-weight:bold; color:#2c3e50;">แผ่นที่ ${idx+1}</div><div class="canvas-container"><canvas id="c${idx}"></canvas></div>`;
            res.appendChild(div);
            
            const canvas = div.querySelector('canvas');
            canvas.width = SHEET_W * SCALE; canvas.height = SHEET_H * SCALE;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = "#f8f9fa"; ctx.fillRect(0,0,canvas.width, canvas.height);
            sheet.strips.forEach(st => {
                st.items.forEach(it => {
                    ctx.fillStyle = "#e3f2fd"; ctx.fillRect(it.x*SCALE, it.y*SCALE, it.w*SCALE, it.h*SCALE);
                    ctx.strokeStyle = "#2980b9"; ctx.lineWidth = 2; ctx.strokeRect(it.x*SCALE, it.y*SCALE, it.w*SCALE, it.h*SCALE);
                    ctx.fillStyle = "#000"; ctx.font = `bold ${4*SCALE}px Arial`; ctx.textAlign = "center";
                    ctx.fillText(`${it.w}x${it.h}`, (it.x + it.w/2)*SCALE, (it.y + it.h/2 + 2)*SCALE);
                });
                ctx.setLineDash([15,10]); ctx.strokeStyle = "#d35400"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo((st.x+st.w)*SCALE, 0); ctx.lineTo((st.x+st.w)*SCALE, SHEET_H*SCALE); ctx.stroke();
            });
        });
        window.scrollTo({top: sumArea.offsetTop - 20, behavior: 'smooth'});
    }

    function exportData() {
        let data = [];
        document.querySelectorAll('.item-row').forEach(row => {
            data.push({ w: row.querySelector('.w').value, h: row.querySelector('.h').value, qty: row.querySelector('.qty').value });
        });
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'cutting_list.json'; a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                document.getElementById('items-list').innerHTML = '';
                data.forEach(item => addItem(item.w, item.h, item.qty));
            } catch (err) { alert('ไฟล์ไม่ถูกต้อง'); }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
